<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h2>Suspicious navigation detected</h2>
  <div id="details" class="card mono"></div>
  <div class="card">
    <button id="continueOnce">Continue once</button>
    <button id="alwaysAllow">Always allow this origin</button>
    <button id="alwaysBlock">Always block this origin</button>
    <button id="cancel">Cancel / stay here</button>
    <div id="status"></div>
  </div>
  <script src="prompt.js"></script>
</body>
</html>
